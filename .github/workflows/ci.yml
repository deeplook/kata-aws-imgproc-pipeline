name: CI

on:
  push:
    branches: [main, solution]
  pull_request:
    branches: [main, solution]

jobs:
  lint:
    name: Lint
    # Stubs on main have intentionally unused imports; lint the reference only
    if: github.ref == 'refs/heads/solution' || (github.event_name == 'pull_request' && github.base_ref == 'solution')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Test
    # Handlers are stubs on main; tests target the completed reference only
    if: github.ref == 'refs/heads/solution' || (github.event_name == 'pull_request' && github.base_ref == 'solution')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
